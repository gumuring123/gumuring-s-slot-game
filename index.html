<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 온라인 어드민 슬롯머신 🎰</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* --- [기존 디자인 유지] --- */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #2c3e50; color: white; text-align: center; margin: 0; padding: 0; user-select: none; }
        #balance-ui { position: absolute; top: 20px; right: 30px; font-size: 24px; font-weight: bold; background: rgba(0, 0, 0, 0.5); padding: 15px 25px; border-radius: 10px; border: 2px solid #f1c40f; }
        h1 { margin-top: 80px; color: #ecf0f1; }
        .slot-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .slot { width: 120px; height: 120px; background: #ecf0f1; border-radius: 15px; border: 5px solid #bdc3c7; font-size: 70px; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); color: black; }
        #message { height: 40px; font-size: 22px; font-weight: bold; color: #f1c40f; margin-bottom: 20px; }
        .controls { background: #34495e; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.3); margin-bottom: 30px; max-width: 650px; }
        .bet-info { font-size: 20px; margin-bottom: 15px; }
        .bet-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.95); }
        .btn-bet { background: #3498db; color: white; }
        .btn-bet-high { background: #9b59b6; color: white; }
        .btn-spin { background: #e74c3c; color: white; font-size: 24px; padding: 15px 40px; display: block; margin: 20px auto 0; width: 100%; box-sizing: border-box;}
        .grind-area { background: #27ae60; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-grind { background: #f1c40f; color: #2c3e50; font-size: 20px; padding: 15px 30px; margin-top: 10px; }
        
        /* --- [추가된 로그인 및 콘솔 디자인] --- */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: #34495e; padding: 40px; border-radius: 20px; border: 3px solid #f1c40f; text-align: center; }
        .modal input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 220px; font-size: 16px; }
        #console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9); padding: 15px; box-sizing: border-box; text-align: left; border-top: 2px solid #2ecc71; z-index: 1000; }
        #console-input { width: 80%; background: transparent; border: none; color: #2ecc71; font-size: 18px; outline: none; font-family: monospace; }
        #console-prefix { color: #2ecc71; font-size: 18px; font-family: monospace; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div id="step-1" class="modal">
            <h1 style="margin-top:0;">🚀 게임 접속</h1>
            <button onclick="window.game.login()" style="padding: 15px 30px; background:#4285F4; color:white; border:none; border-radius:10px; cursor:pointer; font-size:18px;">Google 계정으로 시작</button>
        </div>
        <div id="step-2" class="modal" style="display:none;">
            <h2>📝 프로필 생성</h2>
            <input type="text" id="reg-id" placeholder="사용할 닉네임"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호 설정"><br>
            <button onclick="window.game.completeReg()" style="padding: 10px 20px; background:#27ae60; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px;">게임 시작하기</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="balance-ui">총 소지금: <span id="balance">0</span>원</div>
        <h1>🎰 어드민 슬롯머신 🎰</h1>
        <div class="slot-container">
            <div class="slot" id="slot1">❓</div>
            <div class="slot" id="slot2">❓</div>
            <div class="slot" id="slot3">❓</div>
        </div>
        <div id="message">환영합니다! 명령어를 사용하려면 ` 키를 누르세요.</div>
        <div class="controls">
            <div class="bet-info">현재 베팅금: <span id="current-bet">0</span>원</div>
            <div class="bet-buttons">
                <button class="btn-bet" onclick="window.game.addBet(1)">+1</button>
                <button class="btn-bet" onclick="window.game.addBet(10)">+10</button>
                <button class="btn-bet" onclick="window.game.addBet(100)">+100</button>
                <button class="btn-bet-high" onclick="window.game.addBet(1000)">+1K</button>
                <button class="btn-bet-high" onclick="window.game.addBet(10000)">+10K</button>
                <button class="btn-bet-high" onclick="window.game.addBet(100000)">+100K</button>
                <button class="btn-bet-high" onclick="window.game.addBet(1000000)">+1M</button>
                <button class="btn-bet-high" onclick="window.game.addBet(10000000)">+10M</button>
                <button onclick="window.game.resetBet()" style="background: #95a5a6; color: white;">초기화</button>
            </div>
            <button class="btn-spin" onclick="window.game.spin()">🚀 실행</button>
        </div>
        <br>
        <div class="grind-area">
            <div style="font-size: 18px; font-weight: bold;">[ 클릭 노동 ] 10번 누르면 1원 지급</div>
            <div style="margin-top: 5px;">현재 진행도: <span id="grind-count">0</span> / 10</div>
            <button class="btn-grind" onclick="window.game.grind()">⛏️ 돈 벌기</button>
        </div>
    </div>

    <div id="console">
        <span id="console-prefix">>_</span>
        <input type="text" id="console-input" placeholder="커맨드 입력: /set me coin 1000" autocomplete="off">
    </div>

    <script>
    (function() {
        // --- ⚙️ 설정 구역 ---
        const firebaseConfig = {
		apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
		authDomain: "gumurings-slot-game.firebaseapp.com",
		projectId: "gumurings-slot-game",
		storageBucket: "gumurings-slot-game.firebasestorage.app",
		messagingSenderId: "1006027725856",
		appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
		};
        const ADMIN_EMAIL = "gumuring123@gmail.com"; // 👈 치트 권한용 이메일
        // ------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let balance = 0;
        let currentBet = 0;
        let grindCount = 0;
        let myUID = "";

        const multipliers = { '💎': 10, '💲': 7, '💰': 5, '🍀': 3, '☢️': 1.1, '💣': 0 };
        const probabilities = { '💎': 5, '💲': 10, '💰': 13, '🍀': 17, '☢️': 25, '💣': 30 };
        const symbols = Object.keys(probabilities);

        window.game = {
            login: async function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                myUID = res.user.uid;
                this.checkUser();
            },
            checkUser: async function() {
                const doc = await db.collection("users").doc(myUID).get();
                if (doc.exists) {
                    balance = doc.data().balance;
                    this.start(doc.data().gameId);
                } else {
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-2').style.display = 'block';
                }
            },
            completeReg: async function() {
                const gid = document.getElementById('reg-id').value;
                if(!gid) return alert("닉네임을 입력하세요.");
                await db.collection("users").doc(myUID).set({ gameId: gid, balance: 1000, email: auth.currentUser.email });
                balance = 1000;
                this.start(gid);
            },
            start: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                this.updateUI();
            },
            updateUI: function() {
                document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
                document.getElementById('current-bet').innerText = currentBet.toLocaleString();
                document.getElementById('grind-count').innerText = grindCount;
            },
            addBet: function(amount) {
                currentBet += amount;
                this.updateUI();
            },
            resetBet: function() {
                currentBet = 0;
                this.updateUI();
            },
            grind: async function() {
                grindCount++;
                if (grindCount >= 10) {
                    balance += 1;
                    grindCount = 0;
                    this.showMessage("1원을 벌었습니다!", "#2ecc71");
                    await db.collection("users").doc(myUID).update({ balance: balance });
                }
                this.updateUI();
            },
            spin: async function() {
                if (currentBet <= 0) return this.showMessage("베팅금을 설정하세요!", "#e74c3c");
                if (currentBet > balance) return this.showMessage("소지금이 부족합니다!", "#e74c3c");

                balance -= currentBet;
                let result = [this.getRandomSymbol(), this.getRandomSymbol(), this.getRandomSymbol()];
                document.getElementById('slot1').innerText = result[0];
                document.getElementById('slot2').innerText = result[1];
                document.getElementById('slot3').innerText = result[2];

                let counts = {};
                result.forEach(s => counts[s] = (counts[s] || 0) + 1);
                let won = false; let winSymbol = null;
                for (let s in counts) { if (counts[s] >= 2) { won = true; winSymbol = s; break; } }

                if (won) {
                    let m = multipliers[winSymbol];
                    let prize = currentBet * m;
                    balance += prize;
                    this.showMessage(m === 0 ? `[${winSymbol}] 꽝! (0배)` : `🎉 당첨! [${winSymbol}] ${m}배! ${Math.floor(prize).toLocaleString()}원 획득!`, "#f1c40f");
                } else {
                    this.showMessage("아쉽네요!", "#95a5a6");
                }
                this.updateUI();
                await db.collection("users").doc(myUID).update({ balance: balance });
            },
            getRandomSymbol: function() {
                let rand = Math.random() * 100; let sum = 0;
                for (let symbol in probabilities) {
                    sum += probabilities[symbol];
                    if (rand < sum) return symbol;
                }
            },
            showMessage: function(text, color) {
                const m = document.getElementById('message');
                m.innerText = text; m.style.color = color;
            }
        };

        // 명령어 시스템
        const consoleEl = document.getElementById('console');
        const consoleInput = document.getElementById('console-input');

        document.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                e.preventDefault();
                if (auth.currentUser?.email !== ADMIN_EMAIL) return;
                if (consoleEl.style.display === 'block') {
                    consoleEl.style.display = 'none';
                    consoleInput.blur();
                } else {
                    consoleEl.style.display = 'block';
                    consoleInput.focus();
                }
            }
        });

        consoleInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                let parts = consoleInput.value.trim().split(' ');
                consoleInput.value = '';
                consoleEl.style.display = 'none';

                if (parts[0] === '/set' && parts[1] === 'me' && parts[2] === 'coin') {
                    let val = parseInt(parts[3]);
                    if (!isNaN(val)) {
                        balance = val;
                        window.game.updateUI();
                        await db.collection("users").doc(myUID).update({ balance: balance });
                        window.game.showMessage(`[치트] 소지금을 ${val.toLocaleString()}원으로 변경`, "#3498db");
                    }
                }
            }
        });
    })();
    </script>
</body>
</html>
