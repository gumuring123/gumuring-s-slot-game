<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 ONLINE MASTER SLOT 🎰</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        /* --- [디자인: 기존 스타일 유지 + 로그인 창] --- */
        body { background-color: #1a1a1a; color: white; font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 로그인 화면 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal { background: #2c3e50; padding: 40px; border-radius: 20px; border: 3px solid #f1c40f; text-align: center; box-shadow: 0 0 50px rgba(241, 196, 15, 0.3); }
        .modal input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 200px; font-size: 16px; }
        .btn-main { padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: 0.2s; }
        .btn-google { background: #db4437; color: white; margin-bottom: 20px; }
        .btn-start { background: #27ae60; color: white; }

        /* 게임 UI */
        #game-ui { display: none; text-align: center; }
        .status-bar { position: absolute; top: 20px; right: 20px; font-size: 18px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; border: 1px solid #f1c40f; }
        .slot-machine { background: #34495e; padding: 30px; border-radius: 20px; border: 10px solid #f1c40f; display: flex; gap: 15px; margin-bottom: 30px; }
        .slot { width: 120px; height: 150px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 80px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .spin-btn { width: 200px; height: 60px; font-size: 24px; background: #e74c3c; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 5px #c0392b; }
        .spin-btn:active { transform: translateY(4px); box-shadow: 0 1px #c0392b; }

        /* 어드민 콘솔 */
        #admin-console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 10px; color: #2ecc71; font-family: monospace; z-index: 10000; border-top: 2px solid #2ecc71; }
        #console-input { background: none; border: none; color: #2ecc71; width: 85%; outline: none; font-size: 18px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div id="step-1" class="modal">
            <h1 style="color: #f1c40f; margin-top: 0;">🎰 MASTER SLOT</h1>
            <p>온라인 저장을 위해 로그인이 필요합니다.</p>
            <button class="btn-main btn-google" onclick="window.game.login()">Google 계정 인증</button>
        </div>

        <div id="step-2" class="modal" style="display: none;">
            <h2>📝 프로필 생성</h2>
            <p>사용할 게임 아이디와 비번을 정해주세요.</p>
            <input type="text" id="reg-id" placeholder="게임 닉네임"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호"><br>
            <button class="btn-main btn-start" onclick="window.game.completeRegistration()">게임 접속하기</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="status-bar">
            👤 <span id="display-id">Guest</span> | 💰 <span id="display-balance">0</span>원
        </div>

        <h1 style="font-size: 40px; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);">PREMIUM SLOT</h1>

        <div class="slot-machine">
            <div class="slot" id="s1">❓</div>
            <div class="slot" id="s2">❓</div>
            <div class="slot" id="s3">❓</div>
        </div>

        <button class="spin-btn" onclick="window.game.spin()">SPIN! (100원)</button>
        <p id="msg" style="margin-top: 20px; font-size: 20px; font-weight: bold;"></p>
    </div>

    <div id="admin-console">
        <span>admin@system:~$</span>
        <input type="text" id="console-input" placeholder="명령어를 입력하세요...">
    </div>

    <script>
    /* --- [보안 클로저 구역] --- */
    (function() {
        // -------------------------------------------------------
        // 🔥 여기에 본인의 Firebase 설정값을 복사해서 넣으세요!
        // -------------------------------------------------------
        const firebaseConfig = {
  apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
  authDomain: "gumurings-slot-game.firebaseapp.com",
  projectId: "gumurings-slot-game",
  storageBucket: "gumurings-slot-game.firebasestorage.app",
  messagingSenderId: "1006027725856",
  appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
};
        const ADMIN_EMAIL = "gumuring123@gmail.com"; // 👈 어드민 권한 부여
        // -------------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let balance = 0;
        let myUID = "";
        const icons = ['💎', '💰', '🍀', '🍒', '💣'];

        window.game = {
            // 구글 로그인
            login: async function() {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);
                    myUID = result.user.uid;
                    this.checkUserRecord();
                } catch(e) { alert("로그인 중 오류가 발생했습니다."); }
            },

            // 유저 기록 확인
            checkUserRecord: async function() {
                const doc = await db.collection("users").doc(myUID).get();
                if (doc.exists) {
                    balance = doc.data().balance;
                    this.launch(doc.data().gameId);
                } else {
                    document.getElementById('step-1').style.display = 'none';
                    document.getElementById('step-2').style.display = 'block';
                }
            },

            // 프로필 등록
            completeRegistration: async function() {
                const gid = document.getElementById('reg-id').value;
                const gpw = document.getElementById('reg-pw').value;
                if(!gid) return alert("아이디를 입력하세요!");

                await db.collection("users").doc(myUID).set({
                    gameId: gid,
                    gamePw: gpw,
                    balance: 1000,
                    email: auth.currentUser.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                balance = 1000;
                this.launch(gid);
            },

            // 게임 화면 진입
            launch: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('display-id').innerText = id;
                this.render();
            },

            // 슬롯 돌리기 로직
            spin: async function() {
                if(balance < 100) return this.log("소지금이 부족합니다!", "#e74c3c");

                balance -= 100;
                this.render();

                // 애니메이션 효과 (간이)
                const slots = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
                const results = [];

                slots.forEach((s, i) => {
                    const res = icons[Math.floor(Math.random() * icons.length)];
                    results.push(res);
                    s.innerText = res;
                });

                // 결과 판정
                if (results[0] === results[1] && results[1] === results[2]) {
                    const winAmount = 2000;
                    balance += winAmount;
                    this.log(`🎊 잭팟!! ${winAmount}원 획득! 🎊`, "#f1c40f");
                } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                    const winAmount = 150;
                    balance += winAmount;
                    this.log(`✨ 더블! ${winAmount}원 회수!`, "#2ecc71");
                } else {
                    this.log("꽝입니다. 다시 도전하세요!", "#bdc3c7");
                }

                this.render();
                // DB 실시간 저장
                await db.collection("users").doc(myUID).update({ balance: balance });
            },

            render: function() {
                document.getElementById('display-balance').innerText = Math.floor(balance).toLocaleString();
            },

            log: function(m, color) {
                const el = document.getElementById('msg');
                el.innerText = m;
                el.style.color = color;
            }
        };

        // --- 어드민 시스템 ( ` 키) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                e.preventDefault();
                if (auth.currentUser && auth.currentUser.email === ADMIN_EMAIL) {
                    const con = document.getElementById('admin-console');
                    con.style.display = con.style.display === 'block' ? 'none' : 'block';
                    document.getElementById('console-input').focus();
                } else {
                    console.warn("접근 권한이 없습니다.");
                }
            }
        });

        document.getElementById('console-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value;
                const cmd = val.split(' ');

                if (cmd[0] === '/set' && cmd[1] === 'me' && cmd[2] === 'coin') {
                    balance = parseInt(cmd[3]);
                    window.game.render();
                    await db.collection("users").doc(myUID).update({ balance: balance });
                    alert("치트 적용 완료: " + balance);
                }
                e.target.value = '';
            }
        });

    })();
    </script>
</body>
</html>
