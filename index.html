<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎰 VIP NEON CASINO 🎰</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* --- [스타일: 기존 네온 디자인 + 출석체크 추가] --- */
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');

        body { font-family: 'Malgun Gothic', sans-serif; background: radial-gradient(circle at center, #1a0033 0%, #000000 100%); color: white; text-align: center; margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        
        /* 상단 UI 레이아웃 */
        #balance-ui { position: absolute; top: 20px; right: 30px; font-size: 20px; font-weight: bold; background: linear-gradient(145deg, #111, #222); padding: 15px 25px; border-radius: 15px; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); z-index: 100; min-width: 180px; }
        #attendance-btn { position: absolute; top: 20px; left: 30px; padding: 12px 20px; background: linear-gradient(180deg, #ff00de, #9b0082); color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff00de; z-index: 100; transition: 0.3s; }
        #attendance-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px #ff00de; }

        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #ecf0f1; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .money-info { font-size: 26px; color: #ffd700; text-shadow: 0 0 10px #ffd700; }

        /* 슬롯 & 메시지 */
        h1 { margin-top: 80px; font-family: 'Black Han Sans', sans-serif; font-size: 55px; color: #fff; text-shadow: 0 0 20px #ff00de; animation: neon-pulse 1.5s infinite alternate; }
        .slot-container { display: inline-flex; justify-content: center; gap: 20px; margin: 30px 0; background: #111; padding: 30px 40px; border-radius: 25px; border: 4px solid #333; box-shadow: 0 0 30px #ff00de; position: relative; }
        .slot { width: 130px; height: 140px; background: linear-gradient(180deg, #ddd, #fff, #aaa); border-radius: 15px; font-size: 80px; display: flex; justify-content: center; align-items: center; color: black; box-shadow: inset 0 10px 20px rgba(0,0,0,0.3); }
        #message { height: 40px; font-size: 26px; font-weight: bold; color: #ffd700; margin-bottom: 20px; }

        /* 컨트롤 패널 */
        .controls { background: #1a252f; padding: 25px; border-radius: 20px; display: inline-block; border: 1px solid #444; max-width: 700px; }
        .bet-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.2s; background: #3498db; }
        button:active { transform: translateY(3px); }
        .btn-spin { background: linear-gradient(180deg, #ff4757, #ff1e34); font-size: 28px; padding: 15px; width: 100%; margin-top: 10px; border-radius: 12px; }

        /* 채굴 구역 */
        .grind-area { background: #092814; padding: 20px; border-radius: 15px; display: inline-block; border: 2px solid #2ecc71; margin-top: 20px; }
        .btn-grind { background: #f1c40f; color: black; font-size: 18px; padding: 10px 20px; }

        /* 모달 & 콘솔 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #00ffff; text-align: center; width: 320px; }
        .modal input { padding: 12px; margin: 10px 0; width: 90%; background: #222; color: #00ffff; border: 1px solid #444; text-align: center; }
        #console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.9); padding: 15px; border-top: 2px solid #ff00de; z-index: 10000; text-align: left; }
        #console-input { background: transparent; border: none; color: #ff00de; font-size: 18px; outline: none; width: 80%; font-family: monospace; }
    </style>
</head>
<body>

    <div id="attendance-overlay" class="modal-overlay">
        <div class="modal" style="border-color: #ff00de;">
            <h2 style="color: #ff00de;">📅 DAILY CHECK-IN</h2>
            <p id="att-status">정보를 불러오는 중...</p>
            <p id="att-streak" style="font-size: 18px; color: #00ffff; font-weight: bold;"></p>
            <button id="do-att-btn" onclick="window.game.doAttendance()" style="background: #2ecc71; width: 100%; padding: 15px; display:none;">보상 받기</button>
            <button onclick="document.getElementById('attendance-overlay').style.display='none'" style="margin-top:10px; background:#555;">닫기</button>
        </div>
    </div>

    <div id="auth-overlay">
        <div id="step-login" class="modal">
            <h1 style="margin:0 0 20px 0; font-size: 30px; color:#00ffff;">🎰 CASINO LOGIN</h1>
            <input type="text" id="login-id" placeholder="아이디"><br>
            <input type="password" id="login-pw" placeholder="비밀번호"><br>
            <button onclick="window.game.loginIdPw()" style="width:100%; padding:15px; background:#2ecc71; margin-top:10px;">로그인</button>
            <hr style="border:0; border-top:1px solid #444; margin: 20px 0;">
            <button onclick="window.game.registerGoogle()" style="width:100%; background:#4285F4;">구글로 아이디 생성</button>
        </div>
        <div id="step-register" class="modal" style="display:none;">
            <h2 style="color:#ff00de;">📝 ID 설정</h2>
            <input type="text" id="reg-id" placeholder="사용할 아이디"><br>
            <input type="password" id="reg-pw" placeholder="비밀번호"><br>
            <button onclick="window.game.completeReg()" style="width:100%; background:#ff00de; padding:15px;">발급 완료</button>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <button id="attendance-btn" onclick="window.game.openAttendance()">📅 출석체크</button>
        
        <div id="balance-ui">
            <div class="user-info">
                <span>👤 <span id="display-id" style="color: #00ffff;">Guest</span></span>
                <span style="cursor:pointer;" onclick="location.reload()">🚪</span>
            </div>
            <div class="money-info">💰 <span id="balance">0</span></div>
        </div>

        <h1>✨ MEGA JACKPOT ✨</h1>
        <div class="slot-container">
            <div class="slot" id="slot1">❓</div>
            <div class="slot" id="slot2">❓</div>
            <div class="slot" id="slot3">❓</div>
        </div>
        <div id="message">행운을 빌어보세요!</div>

        <div class="controls">
            <div style="color:#00ffff;">🔥 베팅금: <span id="current-bet">0</span></div>
            <div class="bet-buttons">
                <button onclick="window.game.addBet(1)">+1</button>
                <button onclick="window.game.addBet(10)">+10</button>
                <button onclick="window.game.addBet(100)">+100</button>
                <button onclick="window.game.addBet(1000)" style="background:#9b59b6;">+1K</button>
                <button onclick="window.game.addBet(1000000)" style="background:#e67e22;">+1M</button>
                <button onclick="window.game.resetBet()" style="background:#7f8c8d;">리셋</button>
            </div>
            <button class="btn-spin" onclick="window.game.spin()">🎰 SPIN!</button>
        </div>

        <br>
        <div class="grind-area">
            <div>[ 무료 코인 채굴 ] 진행도: <span id="grind-count">0</span> / 10</div>
            <button class="btn-grind" onclick="window.game.grind()">⛏️ 코인 캐기</button>
        </div>
    </div>

    <div id="console">
        <span style="color:#00ffff; font-family:monospace;">ADMIN@ROOT:~$</span>
        <input type="text" id="console-input" placeholder="명령어 입력..." autocomplete="off">
    </div>

    <script>
    (function() {
        const firebaseConfig = {
		apiKey: "AIzaSyBF9sb_UYjPt6J_O7g6p4FkLSbggUC6cfM",
		authDomain: "gumurings-slot-game.firebaseapp.com",
		projectId: "gumurings-slot-game",
		storageBucket: "gumurings-slot-game.firebasestorage.app",
		messagingSenderId: "1006027725856",
		appId: "1:1006027725856:web:b7e5d7b55eac14dc377045"
		};
        const ADMIN_ID = "gumuring"; // 👈 본인의 어드민 아이디

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let balance = 0;
        let currentBet = 0;
        let grindCount = 0;
        let myUID = "";
        let userData = null;

        const multipliers = { '💎': 10, '💰': 5, '🍀': 3, '💣': 0 };
        const probabilities = { '💎': 5, '💰': 15, '🍀': 30, '💣': 50 };
        const symbols = Object.keys(probabilities);

        // 오전 7시 기준 날짜 계산
        function getGameDate() {
            const now = new Date();
            if (now.getHours() < 7) now.setDate(now.getDate() - 1);
            return now.toISOString().split('T')[0];
        }

        window.game = {
            isLocalAction: false,
            unsubscribe: null,

            loginIdPw: async function() {
                const id = document.getElementById('login-id').value;
                const pw = document.getElementById('login-pw').value;
                const snapshot = await db.collection("users").where("gameId", "==", id).where("gamePw", "==", pw).get();
                if(snapshot.empty) return alert("아이디/비번이 틀렸습니다.");
                myUID = snapshot.docs[0].id;
                window.myGameId = id;
                this.start(id);
            },

            registerGoogle: async function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                myUID = res.user.uid;
                const doc = await db.collection("users").doc(myUID).get();
                if (doc.exists) {
                    alert("가입된 계정입니다. 아이디로 로그인하세요.");
                    auth.signOut();
                } else {
                    document.getElementById('step-login').style.display = 'none';
                    document.getElementById('step-register').style.display = 'block';
                }
            },

            completeReg: async function() {
                const id = document.getElementById('reg-id').value;
                const pw = document.getElementById('reg-pw').value;
                await db.collection("users").doc(myUID).set({ gameId: id, gamePw: pw, balance: 1000, banned: false });
                window.myGameId = id;
                this.start(id);
            },

            start: function(id) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('display-id').innerText = id;
                
                if(this.unsubscribe) this.unsubscribe();
                this.unsubscribe = db.collection("users").doc(myUID).onSnapshot((doc) => {
                    if (!doc.exists) return;
                    userData = doc.data();
                    if (userData.banned) { alert("🚨 차단됨"); location.reload(); }
                    
                    // 어드민 기부 감지
                    if (userData.balance > balance && !this.isLocalAction) {
                        this.showMessage(`🎁 어드민이 ${(userData.balance - balance).toLocaleString()}코인을 쐈습니다!`, "#00ffff");
                    }
                    balance = userData.balance;
                    this.updateUI();
                });
            },

            updateUI: function() {
                document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
                document.getElementById('current-bet').innerText = currentBet.toLocaleString();
                document.getElementById('grind-count').innerText = grindCount;
            },

            openAttendance: function() {
                document.getElementById('attendance-overlay').style.display = 'flex';
                const today = getGameDate();
                const last = userData.lastAttendance || "";
                const streak = userData.streak || 0;
                document.getElementById('att-streak').innerText = `${streak}일 연속 출석 중!`;
                if (last === today) {
                    document.getElementById('att-status').innerText = "오늘 출석 완료!";
                    document.getElementById('do-att-btn').style.display = 'none';
                } else {
                    document.getElementById('att-status').innerText = "보상을 받으세요!";
                    document.getElementById('do-att-btn').style.display = 'block';
                }
            },

            doAttendance: async function() {
                const today = getGameDate();
                const last = userData.lastAttendance || "";
                let streak = userData.streak || 0;

                // 어제 날짜 구하기 (연속 체크)
                const yesterday = new Date();
                yesterday.setHours(yesterday.getHours() < 7 ? yesterday.getHours() - 24 : yesterday.getHours());
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];

                streak = (last === yesterdayStr) ? streak + 1 : 1;
                const reward = Math.floor(1000 * (streak / 10 + 0.9));

                this.isLocalAction = true;
                await db.collection("users").doc(myUID).update({
                    balance: firebase.firestore.FieldValue.increment(reward),
                    lastAttendance: today, streak: streak
                });
                document.getElementById('attendance-overlay').style.display = 'none';
                this.showMessage(`🎁 출석 완료! ${reward}코인 획득!`, "#2ecc71");
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            grind: async function() {
                grindCount++;
                if (grindCount >= 10) {
                    grindCount = 0;
                    this.isLocalAction = true;
                    await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(1) });
                    this.showMessage("✨ 1원 채굴 성공!", "#2ecc71");
                    setTimeout(() => this.isLocalAction = false, 1000);
                }
                this.updateUI();
            },

            addBet: function(n) { currentBet += n; this.updateUI(); },
            resetBet: function() { currentBet = 0; this.updateUI(); },

            spin: async function() {
                if(balance < currentBet || currentBet <= 0) return this.showMessage("코인이 부족합니다!", "#ff4757");

                balance -= currentBet; this.updateUI();
                
                const res = [this.getRandomSymbol(), this.getRandomSymbol(), this.getRandomSymbol()];
                document.getElementById('slot1').innerText = res[0];
                document.getElementById('slot2').innerText = res[1];
                document.getElementById('slot3').innerText = res[2];

                let counts = {}; res.forEach(s => counts[s] = (counts[s] || 0) + 1);
                let winS = null; let mCount = 0;
                for(let s in counts) { if(counts[s] >= 2) { winS = s; mCount = counts[s]; break; } }

                let prize = 0;
                if(winS) {
                    prize = currentBet * multipliers[winS];
                    if(mCount === 3) {
                        prize *= 2;
                        this.showMessage(`🔥 3개 일치! 2배 잭팟! ${prize.toLocaleString()}원!`, "#00ffff");
                    } else {
                        this.showMessage(`🎉 당첨! ${prize.toLocaleString()}원!`, "#ffd700");
                    }
                } else { this.showMessage("꽝!", "#888"); }

                this.isLocalAction = true;
                await db.collection("users").doc(myUID).update({ balance: firebase.firestore.FieldValue.increment(prize - currentBet) });
                setTimeout(() => this.isLocalAction = false, 1000);
            },

            getRandomSymbol: function() {
                let r = Math.random() * 100; let s = 0;
                for(let k in probabilities) { s += probabilities[k]; if(r < s) return k; }
            },

            showMessage: function(t, c) {
                const m = document.getElementById('message');
                m.innerText = t; m.style.color = c;
            }
        };

        // 콘솔 및 키 이벤트
        document.addEventListener('keydown', (e) => {
            if (e.key === '`' && window.myGameId === ADMIN_ID) {
                const c = document.getElementById('console');
                c.style.display = c.style.display === 'block' ? 'none' : 'block';
                if(c.style.display === 'block') document.getElementById('console-input').focus();
            }
        });

        document.getElementById('console-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.split(' '); e.target.value = '';
                document.getElementById('console').style.display = 'none';
                if (val[0] === '/give' && val[2] === 'coin') {
                    const snap = await db.collection("users").where("gameId", "==", val[1]).get();
                    if(!snap.empty) snap.docs[0].ref.update({ balance: firebase.firestore.FieldValue.increment(parseInt(val[3])) });
                }
            }
        });
    })();
    </script>
</body>
</html>
